name: Trigger auto deployment for react-docker-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.REACTDOCKERAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.REACTDOCKERAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.REACTDOCKERAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile
          acrName: reactazuretestdeploy
          containerAppName: react-docker-app
          resourceGroup: DefaultResourceGroup-CID
          imageToBuild: reactazuretestdeploy.azurecr.io/react-app:${{ github.sha }}
