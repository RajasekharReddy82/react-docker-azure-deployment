name: Trigger auto deployment for react-docker-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/react-docker-app-AutoDeployTrigger-c36e4b1f-e0b2-445e-8106-bdd434a25576.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.REACTDOCKERAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.REACTDOCKERAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.REACTDOCKERAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: reactazuretestdeploy.azurecr.io
          registryUsername: ${{ secrets.REACTDOCKERAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.REACTDOCKERAPP_REGISTRY_PASSWORD }}
          containerAppName: react-docker-app
          resourceGroup: DefaultResourceGroup-CID
          imageToBuild: reactazuretestdeploy.azurecr.io/react-docker-app:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


