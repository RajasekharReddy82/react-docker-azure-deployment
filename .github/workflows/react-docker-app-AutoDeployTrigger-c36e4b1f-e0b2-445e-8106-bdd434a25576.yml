name: Trigger auto deployment for react-docker-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: react-docker-app-main
  cancel-in-progress: true

env:
  ACR_NAME: reactazuretestdeploy
  ACR_LOGIN_SERVER: reactazuretestdeploy.azurecr.io
  IMAGE_NAME: react-app
  CONTAINER_APP_NAME: react-docker-app
  RESOURCE_GROUP: DefaultResourceGroup-CID
  APP_URL: https://react-docker-app.gentlestone-7c419d68.centralindia.azurecontainerapps.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm 10
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate
          node --version
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Azure Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.REACTDOCKERAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.REACTDOCKERAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.REACTDOCKERAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy image to Azure Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

      - name: Wait for app rollout
        run: sleep 20

      - name: Health check
        run: |
          curl --fail --silent --show-error "$APP_URL" > /dev/null
